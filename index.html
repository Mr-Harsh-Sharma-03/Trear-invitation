<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treat Invitation ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Page 1 -->
    <div class="card" id="page1">
        <h1>❤️ Will you give Harsh a treat?</h1>

        <button class="yes-btn" onclick="showPage2()">
            Yes ❤️
        </button>

        <button class="no-btn" id="noBtn">
            No 😢
        </button>
    </div>

    <!-- Page 2 -->
    <div class="card hidden" id="page2">
        <h1>📅 Pick a Date</h1>

        <input type="date" id="date">

        <button class="next-btn" onclick="showPage3()">
            Next →
        </button>
    </div>

    <!-- Page 3 -->
    <div class="card hidden" id="page3">

        <h1>✨ Kaisa lga apko?</h1>

        <button class="mood-btn" onclick="submitResponse('Excited 🥰')">
            🥰 Behtarin
        </button>

        <button class="mood-btn" onclick="submitResponse('Happy 😊')">
            😊 Bht Khoob
        </button>

        <button class="mood-btn" onclick="submitResponse('In Love ❤️')">
            ❤️ Badiya
        </button>

        <button class="mood-btn" onclick="submitResponse('Nervous 😳')">
            😳 Thk thak
        </button>

    </div>

    <!-- Page 4 -->
    <div class="card hidden" id="page4">

        <h1>💌</h1>

        <h2>Acha hua apne no nhi kra❤️</h2>

        <p>
            Be ready ✨
        </p>

    </div>

</div>

<script type="module" src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
